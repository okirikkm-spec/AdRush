# Профиль "local" — запуск без Docker, Postgres и MinIO.
# Активация: SPRING_PROFILES_ACTIVE=local  (или -Dspring-boot.run.profiles=local)
# БД в памяти H2, файлы хранятся локально в ./uploads.

spring.datasource.url=jdbc:h2:mem:adrenrush;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update

# MinIO выключен — фото/аватарки сохраняются в локальную папку uploads/
minio.enabled=false
