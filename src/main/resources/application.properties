spring.application.name=AdrenRush Website Backend

# ====== Подключение к БД (PostgreSQL) ======
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:adrenrush_db}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USER:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:password}}

# ====== JPA / Hibernate ======
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# ====== JWT ======
jwt.secret=${JWT_SECRET:adrenrush-super-secret-key-minimum-32-chars-long}
jwt.expiration=${JWT_EXPIRATION:604800000}

# ====== Загрузка файлов ======
spring.servlet.multipart.max-file-size=16MB
spring.servlet.multipart.max-request-size=16MB

# ====== MinIO ======
minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
minio.access-key=${MINIO_USER:minioadmin}
minio.secret-key=${MINIO_PASSWORD:minioadmin}
minio.bucket=${MINIO_BUCKET:adrenrush-media}
minio.enabled=${MINIO_ENABLED:true}

# ====== Стартовый администратор ======
admin.username=${ADMIN_USERNAME:admin}
admin.password=${ADMIN_PASSWORD:admin123}
# Супер-администраторы (через запятую): получают и сохраняют роль ADMIN автоматически,
# их нельзя забанить/удалить/разжаловать. Управлять админ-правами может только супер-админ.
moderation.super-admins=${SUPER_ADMINS:Inori}

# ====== Парсер каталога Adrenaline Rush ======
parser.url=${PARSER_URL:https://adrenalinerush.ru/}
# ежедневный запуск (cron): по умолчанию каждый день в 04:00
parser.cron=${PARSER_CRON:0 0 4 * * *}
parser.enabled=${PARSER_ENABLED:true}

# ====== Каталог Monster Energy ======
# Сайт Monster за Cloudflare недоступен серверу (403 из дата-центра), поэтому авто-парсера нет:
# администратор сохраняет страницу каталога в браузере и загружает HTML через админку
# (POST /api/drinks/parse/monster → MonsterParserService.parseHtml).
